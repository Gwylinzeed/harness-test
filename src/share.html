<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroForge 分享页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>RetroForge Share</h1>
    <div class="status">只读模式</div>
  </header>

  <main class="layout">
    <section class="panel editor-panel">
      <h2 id="shareTitle">加载中</h2>
      <canvas id="shareCanvas" width="640" height="400" aria-label="shared project preview"></canvas>
      <p class="hint">该页面为只读分享页，仅用于浏览项目内容和评论。</p>
    </section>

    <section class="panel project-panel">
      <h2>项目详情</h2>
      <pre id="shareMeta" class="log">[share] waiting</pre>

      <div class="subpanel">
        <h3>逻辑规则</h3>
        <pre id="shareRules" class="log">[rule] 暂无规则</pre>
      </div>

      <div class="subpanel">
        <h3>评论</h3>
        <pre id="shareComments" class="log">[comment] 暂无评论</pre>
      </div>
    </section>
  </main>

  <script src="share.js"></script>
</body>
</html>
